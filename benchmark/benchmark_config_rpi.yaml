# ── global settings ────────────────────────────────────────────────────────────
global:
  server_host: "localhost"
  server_port: 8080
  results_base_dir: "./eval_results"
  warmup_requests: 1      # discarded warm-up requests before each level
  request_timeout: 600    # seconds — RPi inference can be slow
